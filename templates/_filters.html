<form class="filters" method="get">
  <select class="form-select" name="campana_id">
    <option value="">Campana</option>
    {% for item in campanas %}<option value="{{ item.id }}" {% if request.args.get('campana_id') == item.id|string %}selected{% endif %}>{{ item.nombre }}</option>{% endfor %}
  </select>
  <select class="form-select" name="hotel_id">
    <option value="">Hotel</option>
    {% for item in hoteles %}<option value="{{ item.id }}" {% if request.args.get('hotel_id') == item.id|string %}selected{% endif %}>{{ item.nombre }}</option>{% endfor %}
  </select>
  <select class="form-select" name="departamento_id">
    <option value="">Departamento</option>
    {% for item in departamentos %}<option value="{{ item.id }}" {% if request.args.get('departamento_id') == item.id|string %}selected{% endif %}>{{ item.nombre }}</option>{% endfor %}
  </select>
  <select class="form-select" name="sexo">
    <option value="">Sexo</option>
    {% for item in catalogos.sexo %}<option {% if request.args.get('sexo') == item %}selected{% endif %}>{{ item }}</option>{% endfor %}
  </select>
  <select class="form-select" name="edad_rango">
    <option value="">Edad</option>
    {% for item in catalogos.edad_rango %}<option {% if request.args.get('edad_rango') == item %}selected{% endif %}>{{ item }}</option>{% endfor %}
  </select>
  <select class="form-select" name="antiguedad">
    <option value="">Antiguedad</option>
    {% for item in catalogos.antiguedad %}<option {% if request.args.get('antiguedad') == item %}selected{% endif %}>{{ item }}</option>{% endfor %}
  </select>
  <select class="form-select" name="escolaridad">
    <option value="">Escolaridad</option>
    {% for item in catalogos.escolaridad %}<option {% if request.args.get('escolaridad') == item %}selected{% endif %}>{{ item }}</option>{% endfor %}
  </select>
  <input class="form-control" type="date" name="fecha_inicio" value="{{ request.args.get('fecha_inicio', '') }}">
  <input class="form-control" type="date" name="fecha_fin" value="{{ request.args.get('fecha_fin', '') }}">
  <button class="btn btn-primary">Filtrar</button>
  <a class="btn btn-light" href="{{ request.path }}">Limpiar</a>
</form>
