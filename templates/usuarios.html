{% extends "base.html" %}
{% block content %}
<div class="page-head"><div><h1>Usuarios</h1></div></div>
<section class="admin-grid">
  <form method="post" class="admin-form">
    <input type="hidden" name="id" id="user_id">
    <label class="form-label">Nombre completo</label>
    <input class="form-control" name="nombre" id="nombre" required>
    <label class="form-label">Usuario</label>
    <input class="form-control" name="usuario" id="usuario" required>
    <label class="form-label">Contrasena</label>
    <input class="form-control" type="password" name="password" id="password">
    <label class="form-check mt-3"><input class="form-check-input" type="checkbox" name="activo" id="activo" checked> Activo</label>
    <button class="btn btn-primary mt-3">Guardar usuario</button>
  </form>
  <div class="table-responsive">
    <table class="table align-middle">
      <thead><tr><th>Nombre</th><th>Usuario</th><th>Activo</th><th></th></tr></thead>
      <tbody>
        {% for row in rows %}
          <tr>
            <td>{{ row.nombre }}</td><td>{{ row.usuario }}</td><td>{{ 'Si' if row.activo else 'No' }}</td>
            <td><button class="btn btn-sm btn-outline-primary edit-user" data-id="{{ row.id }}" data-nombre="{{ row.nombre }}" data-usuario="{{ row.usuario }}" data-activo="{{ row.activo }}">Editar</button></td>
          </tr>
        {% endfor %}
      </tbody>
    </table>
  </div>
</section>
{% endblock %}
{% block scripts %}<script src="{{ url_for('static', filename='js/admin.js') }}"></script>{% endblock %}
